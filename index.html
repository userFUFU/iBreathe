<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Breathing Field</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="experience" aria-label="interactive calming canvas">
      <fieldset class="scene-picker" aria-label="选择场景">
        <label>
          <input type="radio" name="scene" value="corona" checked>
          <span>雾蓝</span>
        </label>
        <label>
          <input type="radio" name="scene" value="meadow">
          <span>苔绿</span>
        </label>
        <label>
          <input type="radio" name="scene" value="signal">
          <span>浅紫</span>
        </label>
        <label>
          <input type="radio" name="scene" value="tide">
          <span>水蓝</span>
        </label>
        <label>
          <input type="radio" name="scene" value="bloom">
          <span>浅粉</span>
        </label>
        <label>
          <input type="radio" name="scene" value="pendulum">
          <span>石青</span>
        </label>
      </fieldset>
      <div id="static-fallback" class="static-fallback" aria-hidden="true"></div>
      <canvas
        id="field"
        class="data-viz__canvas"
        aria-hidden="true"
        data-engine="canvas 2d"
      ></canvas>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
